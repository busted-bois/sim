name: Ruff Lint

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv

      - name: Ruff Check
        run: |
          uv sync --frozen
          uvx ruff check --fix --exit-non-zero-on-fix .
