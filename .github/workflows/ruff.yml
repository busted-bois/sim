name: Ruff Lint

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b

      - name: Ruff Check
        run: |
          uv sync --frozen
          uvx ruff check .
